name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token (D-06 / T-01-04): nothing beyond what Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't let overlapping pushes race the Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: withastro/action@v6
        # Defaults: Node 24, package manager auto-detected from the lockfile
        # (package-lock.json), runs `astro build`, uploads ./dist as the Pages artifact.
        # To pin Node explicitly later: with: { node-version: 22 }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
